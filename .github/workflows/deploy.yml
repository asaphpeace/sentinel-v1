name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Run backend tests ────────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@localhost:5432/sentinel_test
      SECRET_KEY: ci-test-secret-not-used-in-prod
      ADVISOR_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-prod.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-prod.txt pytest pytest-asyncio

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -x -q --tb=short

  # ── 2. Deploy to VPS (main branch only) ────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/sentinel

            echo "Pulling latest code..."
            git pull origin main

            echo "Building and restarting containers..."
            docker compose up -d --build --remove-orphans

            echo "Waiting for backend health check..."
            sleep 10
            curl -sf http://localhost/health || (docker compose logs backend --tail=50 && exit 1)

            echo "Deploy complete."
