[pytest]
asyncio_mode = auto
; pytest-asyncio >=1.0 defaults to a new event loop per test function, but
; conftest.py's `test_engine` is a single module-level engine created once —
; it implicitly assumes one event loop for the whole session. Pin both
; fixtures and test functions to the session loop so the engine's asyncpg
; connection pool isn't torn down between tests.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_functions = test_*
pythonpath = .
